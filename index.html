<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0b0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>烫画机声音计数器</title>
<style>
:root{color-scheme:dark;--bg:#090c12;--card:#151b26;--card2:#1b2331;--line:#2b3548;--text:#f6f8fc;--muted:#929caf;--green:#5ef0a4;--yellow:#ffd166;--red:#ff7272;--blue:#79aaff}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg)}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at 50% -10%,rgba(121,170,255,.18),transparent 35%),var(--bg);overscroll-behavior:none}.app{width:min(100%,620px);margin:auto;padding:max(14px,env(safe-area-inset-top)) 12px calc(104px + env(safe-area-inset-bottom))}header{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}h1{font-size:22px;line-height:1.15;margin:0;letter-spacing:-.04em}.sub{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.45}.status{flex:none;padding:8px 10px;border:1px solid var(--line);border-radius:99px;background:var(--card);color:var(--muted);font-size:12px;font-weight:800}.status.on{color:var(--green)}.card{background:rgba(21,27,38,.96);border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 50px rgba(0,0,0,.2)}.counter{text-align:center;padding:20px 15px 17px}.label{font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.08em}.total{font-size:clamp(90px,30vw,140px);font-weight:950;line-height:.9;letter-spacing:-.09em;font-variant-numeric:tabular-nums;margin:12px 0 5px}.unit{font-size:13px;color:var(--muted)}.adjust{display:flex;justify-content:center;gap:12px;margin-top:16px}.adjust button{width:62px;height:48px;border:1px solid var(--line);border-radius:15px;background:var(--card2);color:var(--text);font-size:25px;font-weight:900}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.metric{padding:15px 13px}.metric .name{font-size:12px;color:var(--muted);font-weight:800}.metric .value{font-size:clamp(34px,12vw,54px);font-weight:950;line-height:1;margin-top:8px;letter-spacing:-.06em;font-variant-numeric:tabular-nums}.metric.primary .value{color:var(--green)}.note{font-size:11px;color:var(--muted);margin-top:7px;min-height:28px;line-height:1.4}.monitor{margin-top:10px;padding:15px}.monitor-head{display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-bottom:10px}.level-text{color:var(--muted);font-variant-numeric:tabular-nums}.meter{height:15px;border-radius:99px;background:#090c12;border:1px solid var(--line);position:relative;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--green),var(--yellow),var(--red));transition:width .05s linear}.threshold-mark{position:absolute;top:-2px;bottom:-2px;width:3px;background:#fff;left:26%;border-radius:5px}.last{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;min-height:18px}.warning{display:none;margin-top:10px;padding:11px 13px;border-radius:14px;border:1px solid rgba(255,209,102,.28);background:rgba(255,209,102,.08);color:#ffe39b;font-size:12px;line-height:1.5}.warning.show{display:block}details{margin-top:10px}summary{list-style:none;padding:16px;font-weight:850;display:flex;justify-content:space-between}summary::-webkit-details-marker{display:none}summary:after{content:"展开";font-size:12px;color:var(--muted)}details[open] summary:after{content:"收起"}.settings{padding:0 16px 16px}.field{padding:13px 0;border-top:1px solid var(--line)}.field-head{display:flex;justify-content:space-between;gap:12px;margin-bottom:9px;font-size:13px}.field-head label{color:var(--muted);font-weight:800}.field-head span{font-weight:850}input[type=range]{width:100%;accent-color:var(--green)}select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:#0e131d;color:var(--text);font:inherit}.switch-row{display:flex;justify-content:space-between;gap:12px;align-items:center}.switch-row label{font-size:13px;color:var(--muted);font-weight:800}.switch-row input{width:24px;height:24px;accent-color:var(--green)}.help{font-size:12px;color:var(--muted);line-height:1.55;margin-top:10px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;padding:10px}.minor{min-height:46px;border:1px solid var(--line);border-radius:13px;background:var(--card2);color:var(--text);font-weight:850}.minor.danger{color:#ff9696;background:rgba(255,114,114,.08)}.bottom{position:fixed;z-index:10;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,620px);padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(9,12,18,0),rgba(9,12,18,.95) 28%,#090c12 55%)}#start{width:100%;min-height:62px;border:0;border-radius:18px;background:var(--green);color:#07130c;font-size:18px;font-weight:950}#start.stop{background:var(--yellow);color:#201804}.toast{position:fixed;z-index:20;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));transform:translate(-50%,15px);opacity:0;pointer-events:none;background:#fff;color:#10141c;padding:11px 15px;border-radius:12px;font-weight:900;transition:.18s}.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<main class="app">
<header><div><h1>烫画机声音计数器</h1><div class="sub">手机麦克风实时识别提示音 · 数据只保存在本机</div></div><div id="status" class="status">● 未监听</div></header>
<section class="card counter"><div class="label">本次累计</div><div id="total" class="total">0</div><div class="unit">件</div><div class="adjust"><button id="minus">−</button><button id="plus">＋</button></div></section>
<section class="grid"><div class="card metric primary"><div class="name">最近一分钟</div><div id="minute" class="value">0</div><div class="note">滚动统计最近 60 秒</div></div><div class="card metric"><div class="name">预计一小时</div><div id="hour" class="value">--</div><div id="hourNote" class="note">完成 2 件后估算</div></div><div class="card metric"><div class="name">平均每件</div><div id="cycle" class="value">--</div><div class="note">秒 / 件</div></div><div class="card metric"><div class="name">有效计时</div><div id="runtime" class="value" style="font-size:30px">00:00</div><div id="wakeText" class="note">屏幕常亮未启动</div></div></section>
<section class="card monitor"><div class="monitor-head"><span>实时声音强度</span><span id="levelText" class="level-text">0 / 100</span></div><div class="meter"><div id="bar" class="bar"></div><div id="mark" class="threshold-mark"></div></div><div id="last" class="last">点击下方按钮开始监听</div></section>
<div id="secureWarning" class="warning">麦克风只能在 HTTPS 页面使用，请从 GitHub Pages 地址打开。</div>
<div id="backgroundWarning" class="warning">页面切到后台或手机锁屏后可能漏计。工作时请让页面保持在前台。</div>
<details class="card"><summary>识别设置</summary><div class="settings">
<div class="field"><div class="field-head"><label>声音类型</label></div><select id="mode"><option value="beep">电子提示音 / 蜂鸣声</option><option value="general">机械声 / 通用响声</option></select></div>
<div class="field"><div class="field-head"><label>声音阈值</label><span id="thresholdValue">26</span></div><input id="threshold" type="range" min="5" max="90" value="26"></div>
<div class="field"><div class="field-head"><label>防重复间隔</label><span id="cooldownValue">1000 ms</span></div><input id="cooldown" type="range" min="300" max="4000" step="100" value="1000"></div>
<div class="field"><div class="field-head"><label>几次声音算 1 件</label></div><select id="soundsPerPiece"><option value="1">1 次声音 = 1 件</option><option value="2">2 次声音 = 1 件</option></select></div>
<div class="field"><div class="switch-row"><label for="keepAwake">监听时保持屏幕常亮</label><input id="keepAwake" type="checkbox" checked></div></div>
<div class="help">先开始监听并观察声音条。让环境声音低于白线、烫画机提示音明显越过白线。误计就调高阈值或加大防重复间隔；漏计则调低阈值。</div>
</div></details>
<section class="card actions"><button id="test" class="minor">模拟一次声音</button><button id="save" class="minor">保存当前记录</button><button id="reset" class="minor danger">清空全部</button><button id="restore" class="minor">读取已保存</button></section>
</main>
<div class="bottom"><button id="start">开始监听</button></div><div id="toast" class="toast">已计数</div>
<script>
(()=>{
const $=id=>document.getElementById(id),el={status:$('status'),total:$('total'),minute:$('minute'),hour:$('hour'),hourNote:$('hourNote'),cycle:$('cycle'),runtime:$('runtime'),wakeText:$('wakeText'),levelText:$('levelText'),bar:$('bar'),mark:$('mark'),last:$('last'),secureWarning:$('secureWarning'),backgroundWarning:$('backgroundWarning'),mode:$('mode'),threshold:$('threshold'),thresholdValue:$('thresholdValue'),cooldown:$('cooldown'),cooldownValue:$('cooldownValue'),soundsPerPiece:$('soundsPerPiece'),keepAwake:$('keepAwake'),minus:$('minus'),plus:$('plus'),test:$('test'),save:$('save'),reset:$('reset'),restore:$('restore'),start:$('start'),toast:$('toast')};
let stream=null,ctx=null,analyser=null,timeData=null,freqData=null,raf=0,listening=false,above=false,belowSince=0,lastTrigger=0,wakeLock=null,partial=0,count=0,times=[],activeMs=0,runStarted=0,toastTimer=0;
const KEY='heatpress-mobile-v1',SET='heatpress-mobile-settings-v1';
function loadSettings(){try{const s=JSON.parse(localStorage.getItem(SET)||'{}');if(s.mode)el.mode.value=s.mode;if(s.threshold)el.threshold.value=s.threshold;if(s.cooldown)el.cooldown.value=s.cooldown;if(s.soundsPerPiece)el.soundsPerPiece.value=s.soundsPerPiece;if(typeof s.keepAwake==='boolean')el.keepAwake.checked=s.keepAwake}catch{}syncSettings()}
function saveSettings(){localStorage.setItem(SET,JSON.stringify({mode:el.mode.value,threshold:+el.threshold.value,cooldown:+el.cooldown.value,soundsPerPiece:+el.soundsPerPiece.value,keepAwake:el.keepAwake.checked}))}
function syncSettings(){el.thresholdValue.textContent=el.threshold.value;el.cooldownValue.textContent=el.cooldown.value+' ms';el.mark.style.left=el.threshold.value+'%';saveSettings()}
function saveData(show=false){if(listening)activeMs+=Date.now()-runStarted,runStarted=Date.now();localStorage.setItem(KEY,JSON.stringify({count,times,activeMs}));if(show)flash('记录已保存')}
function loadData(show=false){try{const d=JSON.parse(localStorage.getItem(KEY)||'{}');count=Number(d.count)||0;times=Array.isArray(d.times)?d.times.filter(Number.isFinite):[];activeMs=Number(d.activeMs)||0;partial=0;if(show)flash('已读取保存记录')}catch{}updateUI()}
function activeElapsed(){return activeMs+(listening?Date.now()-runStarted:0)}
function fmt(ms){let s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor(s%3600/60);s%=60;return(h?[h,m,s]:[m,s]).map(v=>String(v).padStart(2,'0')).join(':')}
function recentIntervals(){const a=times.slice(-11),out=[];for(let i=1;i<a.length;i++){const d=a[i]-a[i-1];if(d>1000&&d<180000)out.push(d)}return out}
function updateUI(){const now=Date.now(),minute=times.filter(t=>now-t<=60000).length,ints=recentIntervals();el.total.textContent=count;el.minute.textContent=minute;el.runtime.textContent=fmt(activeElapsed());if(ints.length){const avg=ints.reduce((a,b)=>a+b,0)/ints.length;el.hour.textContent=Math.round(3600000/avg);el.cycle.textContent=(avg/1000).toFixed(1);el.hourNote.textContent='按最近 '+ints.length+' 个间隔估算'}else if(count&&activeElapsed()>10000){const avg=activeElapsed()/count;el.hour.textContent=Math.round(3600000/avg);el.cycle.textContent=(avg/1000).toFixed(1);el.hourNote.textContent='按本次整体平均估算'}else{el.hour.textContent='--';el.cycle.textContent='--';el.hourNote.textContent='完成 2 件后估算'}updateWakeText()}
function flash(text){clearTimeout(toastTimer);el.toast.textContent=text;el.toast.classList.add('show');toastTimer=setTimeout(()=>el.toast.classList.remove('show'),900)}
function addPiece(source='声音'){const now=Date.now();count++;times.push(now);el.last.textContent=source+'计数 · '+new Date(now).toLocaleTimeString('zh-CN',{hour12:false});navigator.vibrate?.(35);flash('＋1 件');saveData();updateUI()}
function registerSound(source='声音'){partial++;const need=+el.soundsPerPiece.value;if(partial>=need){partial=0;addPiece(source)}else{el.last.textContent='已识别 1 次，等待第 2 次声音';flash('已识别 1 / 2')}}
function removePiece(){if(count<=0)return;count--;times.pop();partial=0;saveData();updateUI();flash('已减 1 件')}
async function requestWake(){if(!listening||!el.keepAwake.checked||!('wakeLock'in navigator))return;try{wakeLock=await navigator.wakeLock.request('screen');wakeLock.addEventListener('release',updateWakeText,{once:true})}catch{}updateWakeText()}
async function releaseWake(){try{await wakeLock?.release()}catch{}wakeLock=null;updateWakeText()}
function updateWakeText(){if(!('wakeLock'in navigator))el.wakeText.textContent='此浏览器不支持常亮';else if(wakeLock&&!wakeLock.released)el.wakeText.textContent='屏幕常亮已开启';else el.wakeText.textContent='屏幕常亮未启动'}
async function start(){if(listening){stop();return}if(!window.isSecureContext||!navigator.mediaDevices?.getUserMedia){el.secureWarning.classList.add('show');alert('请通过 HTTPS 的 GitHub Pages 地址打开。');return}try{stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});ctx=new(window.AudioContext||window.webkitAudioContext)();await ctx.resume();const src=ctx.createMediaStreamSource(stream);analyser=ctx.createAnalyser();analyser.fftSize=2048;analyser.smoothingTimeConstant=.65;src.connect(analyser);timeData=new Uint8Array(analyser.fftSize);freqData=new Uint8Array(analyser.frequencyBinCount);listening=true;runStarted=Date.now();above=false;belowSince=0;el.status.textContent='● 正在监听';el.status.classList.add('on');el.start.textContent='停止监听';el.start.classList.add('stop');el.last.textContent='正在等待烫画机声音';await requestWake();loop()}catch(e){alert(e.name==='NotAllowedError'?'麦克风权限被拒绝，请在浏览器设置中允许。':'无法启动麦克风：'+e.message)}}
function stop(){if(!listening)return;activeMs+=Date.now()-runStarted;listening=false;cancelAnimationFrame(raf);stream?.getTracks().forEach(t=>t.stop());stream=null;ctx?.close().catch(()=>{});ctx=null;releaseWake();el.status.textContent='● 已停止';el.status.classList.remove('on');el.start.textContent='开始监听';el.start.classList.remove('stop');el.bar.style.width='0%';el.levelText.textContent='0 / 100';el.last.textContent='监听已停止';saveData();updateUI()}
function getLevel(){analyser.getByteTimeDomainData(timeData);let sum=0;for(const v of timeData){const n=(v-128)/128;sum+=n*n}const rms=Math.sqrt(sum/timeData.length),general=Math.min(100,rms*290);if(el.mode.value==='general')return general;analyser.getByteFrequencyData(freqData);const nyq=ctx.sampleRate/2,from=Math.floor(1400/nyq*freqData.length),to=Math.min(freqData.length-1,Math.floor(5200/nyq*freqData.length));let high=0;for(let i=from;i<=to;i++)high+=freqData[i];high=high/Math.max(1,to-from+1)/2.55;return Math.min(100,Math.max(high,general*.45))}
function loop(){if(!listening)return;const level=getLevel(),threshold=+el.threshold.value,now=performance.now(),signal=level>=threshold;el.bar.style.width=level.toFixed(1)+'%';el.levelText.textContent=Math.round(level)+' / 100';if(signal){belowSince=0;if(!above&&now-lastTrigger>=+el.cooldown.value){above=true;lastTrigger=now;registerSound('声音')}}else if(above){if(!belowSince)belowSince=now;if(now-belowSince>140)above=false}raf=requestAnimationFrame(loop)}
el.start.addEventListener('click',start);el.plus.addEventListener('click',()=>addPiece('手动'));el.minus.addEventListener('click',removePiece);el.test.addEventListener('click',()=>registerSound('模拟'));el.save.addEventListener('click',()=>saveData(true));el.restore.addEventListener('click',()=>loadData(true));el.reset.addEventListener('click',()=>{if(confirm('确定清空累计件数和全部记录吗？')){count=0;times=[];partial=0;activeMs=0;if(listening)runStarted=Date.now();saveData();updateUI();el.last.textContent='数据已清空'}});[el.threshold,el.cooldown].forEach(x=>x.addEventListener('input',syncSettings));[el.mode,el.soundsPerPiece,el.keepAwake].forEach(x=>x.addEventListener('change',async()=>{partial=0;saveSettings();if(x===el.keepAwake){if(x.checked)await requestWake();else await releaseWake()}}));document.addEventListener('visibilitychange',async()=>{if(document.hidden&&listening)el.backgroundWarning.classList.add('show');if(!document.hidden&&listening){await ctx?.resume().catch(()=>{});await requestWake();flash('已回到前台，请检查计数')}});window.addEventListener('pagehide',()=>saveData());if(!window.isSecureContext)el.secureWarning.classList.add('show');loadSettings();loadData();updateUI();setInterval(updateUI,1000);
})();
</script>
</body>
</html>
